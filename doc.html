<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100xbtr_sound — Living Document</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#1a1a18;--bg2:#222220;--bg3:#2a2a28;--border:#3a3a38;--tx:#e8e8e4;--tx2:#a0a09a;--tx3:#6a6a66;--accent:#C96B3A;--r:4px;--font:'SF Mono',ui-monospace,monospace;
--idea:#378ADD;--reference:#1D9E75;--material:#BA7517;--decision:#D85A30;--image:#7F77DD;--question:#E8820C;--anchor:#666660;--action:#C96B3A;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--tx);line-height:1.6;font-size:13px;}
.container{max-width:820px;margin:0 auto;padding:32px 24px 80px;}
header{border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:32px;}
header h1{font-size:18px;font-weight:600;color:var(--tx);}
header p{font-size:11px;color:var(--tx3);margin-top:4px;}
.canvas-link{font-size:10px;color:var(--accent);text-decoration:none;margin-top:8px;display:inline-block;}
.canvas-link:hover{text-decoration:underline;}
h2{font-size:14px;font-weight:600;color:var(--tx);margin:32px 0 16px;padding-bottom:6px;border-bottom:1px solid var(--border);}
/* Summary */
.summary-text{color:var(--tx);line-height:1.8;font-size:12px;}
.summary-text h3{font-size:13px;font-weight:600;color:var(--accent);margin:20px 0 8px;}
.summary-text h4{font-size:12px;font-weight:600;color:var(--tx2);margin:16px 0 6px;}
.summary-text p{margin:8px 0;}
.summary-text ul,.summary-text ol{margin:8px 0 8px 20px;}
.summary-text li{margin:4px 0;}
.summary-text strong{color:var(--tx);}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;border-left:3px solid var(--tx3);}
.card.decision{border-left-color:var(--decision);}
.card.question{border-left-color:var(--question);}
.card.action{border-left-color:var(--action);}
.card.idea{border-left-color:var(--idea);}
.card.reference{border-left-color:var(--reference);}
.card.material{border-left-color:var(--material);}
.card-label{font-size:12px;font-weight:600;color:var(--tx);}
.card-desc{font-size:11px;color:var(--tx2);margin-top:4px;}
.card-meta{font-size:9px;color:var(--tx3);margin-top:6px;display:flex;gap:8px;align-items:center;}
.type-badge{font-size:8px;padding:1px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:0.5px;}
.status-badge{font-size:8px;padding:1px 5px;border-radius:2px;background:var(--bg3);color:var(--tx2);}
.status-badge.done{background:rgba(29,158,117,0.2);color:#1D9E75;}
.status-badge.in_progress{background:rgba(201,107,58,0.2);color:var(--accent);}
.see-on-canvas{font-size:9px;color:var(--tx3);text-decoration:none;margin-top:6px;display:inline-block;}
.see-on-canvas:hover{color:var(--accent);text-decoration:underline;}
.ref-url{font-size:9px;color:var(--idea);text-decoration:none;word-break:break-all;}
.ref-url:hover{text-decoration:underline;}
.broken-badge{color:var(--decision);font-size:10px;margin-left:4px;}
/* Group section */
.group-section{margin-bottom:32px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;}
.group-section .card{background:var(--bg3);}
.group-header{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:4px;}
.group-stats{font-size:10px;color:var(--tx3);margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;}
.group-stats span{display:inline-flex;align-items:center;gap:3px;}
.group-stats .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.group-subsection{margin-top:14px;}
.group-subsection-label{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
/* Wire context */
.wire-context{font-size:10px;color:var(--tx3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.wire-context .wire-label{color:var(--tx2);margin-right:2px;}
.wire-context .wire-item{display:inline;margin-right:8px;}
.wire-context .wire-item a{color:var(--tx3);text-decoration:none;}
.wire-context .wire-item a:hover{color:var(--accent);text-decoration:underline;}
/* Progress bar */
.progress-bar{height:3px;background:var(--bg);border-radius:2px;margin-top:8px;margin-bottom:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;background:var(--reference);transition:width 0.3s;}
/* Activity */
.activity-item{font-size:10px;color:var(--tx2);padding:6px 0;border-bottom:1px solid var(--border);}
.activity-item .time{color:var(--tx3);margin-right:8px;}
.activity-item .author{color:var(--accent);}
.snapshot-thumb{max-width:180px;border-radius:4px;margin-top:4px;cursor:pointer;border:1px solid var(--border);transition:opacity 0.2s;}
.snapshot-thumb:hover{opacity:0.85;}
.snapshot-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:999;cursor:pointer;}
.snapshot-overlay.open{display:flex;}
.snapshot-overlay img{max-width:92vw;max-height:92vh;border-radius:6px;}
/* Empty */
.empty{font-size:11px;color:var(--tx3);font-style:italic;padding:12px 0;}
/* Loading */
.loading{text-align:center;padding:60px 0;color:var(--tx3);}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>100xbtr_sound</h1>
    <p>Boutique horn loudspeaker company — Will, Brendan, Nishant</p>
    <a class="canvas-link" href="canvas.html">⤴ Open the canvas</a>
  </header>
  <div id="content"><div class="loading">Loading...</div></div>
</div>
<div class="snapshot-overlay" id="snap-overlay" onclick="this.classList.remove('open')"><img id="snap-full" src=""></div>
<script>
const SURL='https://uzhcjxolnfzcezbntzrz.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6aGNqeG9sbmZ6Y2V6Ym50enJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzUzMDksImV4cCI6MjA5MDY1MTMwOX0.M92v-r1_hYvIj0FLNiXokWn-UFbH_HYK5UCNGuwhQNc';
const sb=supabase.createClient(SURL,SKEY);

let nodes=[],groups=[],links=[],activity=[];

const TC={idea:'#378ADD',reference:'#1D9E75',material:'#BA7517',decision:'#D85A30',image:'#7F77DD',question:'#E8820C',anchor:'#666660',action:'#C96B3A'};

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function openSnapshot(src){document.getElementById('snap-full').src=src;document.getElementById('snap-overlay').classList.add('open');}

function renderSummaryMarkdown(md){
  let html=esc(md);
  html=html.replace(/^## (.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^### (.+)$/gm,'<h4>$1</h4>');
  html=html.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/(?:^- .+(?:\n(?!\n)|$))+/gm,(block)=>{
    const items=block.trim().split(/\n/).map(l=>l.replace(/^- /,'')).map(li=>'<li>'+li+'</li>').join('');
    return'<ul>'+items+'</ul>';
  });
  html=html.replace(/(?:^\d+\. .+(?:\n(?!\n)|$))+/gm,(block)=>{
    const items=block.trim().split(/\n/).map(l=>l.replace(/^\d+\. /,'')).map(li=>'<li>'+li+'</li>').join('');
    return'<ol>'+items+'</ol>';
  });
  return html.split(/\n\n+/).map(block=>{
    block=block.trim();if(!block)return'';
    if(/^<(h3|h4|ul|ol|p)/.test(block))return block;
    return'<p>'+block.replace(/\n/g,'<br>')+'</p>';
  }).join('\n');
}

function canvasLink(nodeId){
  return`<a class="see-on-canvas" href="canvas.html#highlight=${encodeURIComponent(nodeId)}">⤴ see on canvas</a>`;
}

function nodeById(id){return nodes.find(x=>x.id===id);}

function getWireContext(n){
  const ctx={supports:[],blocked_by:[],blocks:[],spawned:[],depends_on:[],depended_by:[]};
  links.forEach(l=>{
    const src=nodeById(l.source),tgt=nodeById(l.target);
    if(!src||!tgt)return;
    const lt=l.link_type||'related';
    if(lt==='supports'&&tgt.id===n.id)ctx.supports.push(src);
    if(lt==='blocks'&&tgt.id===n.id)ctx.blocked_by.push(src);
    if(lt==='blocks'&&src.id===n.id)ctx.blocks.push(tgt);
    if(lt==='spawned'&&src.id===n.id)ctx.spawned.push(tgt);
    if(lt==='depends_on'&&src.id===n.id)ctx.depends_on.push(tgt);
    if(lt==='depends_on'&&tgt.id===n.id)ctx.depended_by.push(src);
  });
  return ctx;
}

function renderWireContext(ctx){
  const sections=[];
  const renderItems=(label,items)=>{
    if(!items.length)return;
    const inner=items.map(n=>`<span class="wire-item"><a href="canvas.html#highlight=${encodeURIComponent(n.id)}">${esc(n.label)}</a></span>`).join('');
    sections.push(`<span class="wire-label">${label}:</span> ${inner}`);
  };
  renderItems('Supported by',ctx.supports);
  renderItems('Blocked by',ctx.blocked_by);
  renderItems('Blocks',ctx.blocks);
  renderItems('Spawned',ctx.spawned);
  renderItems('Depends on',ctx.depends_on);
  renderItems('Required by',ctx.depended_by);
  if(!sections.length)return'';
  return`<div class="wire-context">${sections.join('<br>')}</div>`;
}

function renderCard(n){
  const ctx=getWireContext(n);
  let html=`<div class="card ${n.type}">`;
  html+=`<div class="card-label">${esc(n.label)}</div>`;
  if(n.description)html+=`<div class="card-desc">${esc(n.description)}</div>`;
  if(n.url)html+=`<div style="margin-top:4px;"><a class="ref-url" href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.url)}</a>${n.url_broken?'<span class="broken-badge">⚠ broken</span>':''}</div>`;
  html+='<div class="card-meta">';
  html+=`<span class="type-badge" style="background:${TC[n.type]||TC.idea}22;color:${TC[n.type]||TC.idea};">${n.type}</span>`;
  if(n.status&&n.status!=='open')html+=`<span class="status-badge ${n.status}">${n.status.replace('_',' ')}</span>`;
  if(n.assignee)html+=`<span>${esc(n.assignee)}</span>`;
  if(n.author)html+=`<span style="color:var(--tx3);">by ${esc(n.author)}</span>`;
  html+='</div>';
  html+=renderWireContext(ctx);
  html+=canvasLink(n.id);
  html+='</div>';
  return html;
}

function renderGroupSection(groupNodes,label,groupId){
  const decisions=groupNodes.filter(n=>n.type==='decision');
  const questions=groupNodes.filter(n=>n.type==='question');
  const actions=groupNodes.filter(n=>n.status&&n.type!=='decision');
  const ideas=groupNodes.filter(n=>n.type==='idea'||n.type==='material');
  const refs=groupNodes.filter(n=>n.type==='reference');
  const other=groupNodes.filter(n=>!['decision','question','idea','material','reference'].includes(n.type)&&!n.status);

  // Stats
  const total=groupNodes.length;
  const doneCount=groupNodes.filter(n=>n.status==='done').length;
  const ipCount=groupNodes.filter(n=>n.status==='in_progress').length;
  const openQ=questions.length;
  const blocked=groupNodes.filter(n=>{const ctx=getWireContext(n);return ctx.blocked_by.length>0;}).length;

  let html=`<div class="group-section">`;
  html+=`<div class="group-header">${esc(label)}</div>`;
  html+=`<div class="group-stats">`;
  html+=`<span>${total} node${total!==1?'s':''}</span>`;
  if(decisions.length)html+=`<span><span class="dot" style="background:var(--decision);"></span>${decisions.length} decision${decisions.length!==1?'s':''}</span>`;
  if(openQ)html+=`<span><span class="dot" style="background:var(--question);"></span>${openQ} open question${openQ!==1?'s':''}</span>`;
  if(actions.length)html+=`<span><span class="dot" style="background:var(--action);"></span>${doneCount}/${actions.length} done</span>`;
  if(blocked)html+=`<span style="color:var(--decision);">&#9888; ${blocked} blocked</span>`;
  html+=`</div>`;

  // Progress bar (based on actionable items: decisions + actions)
  const actionable=decisions.length+actions.length;
  if(actionable>0){
    const pct=Math.round(((doneCount+decisions.filter(n=>n.status==='done').length)/actionable)*100);
    html+=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>`;
  }

  // Decisions first
  if(decisions.length){
    html+=`<div class="group-subsection"><div class="group-subsection-label">Decisions</div>`;
    decisions.forEach(n=>{html+=renderCard(n);});
    html+=`</div>`;
  }
  // Open questions
  if(questions.length){
    html+=`<div class="group-subsection"><div class="group-subsection-label">Open Questions</div>`;
    questions.forEach(n=>{html+=renderCard(n);});
    html+=`</div>`;
  }
  // Action items
  if(actions.length){
    const sorted=[...actions].sort((a,b)=>{const o={open:0,in_progress:1,done:2};return(o[a.status]||0)-(o[b.status]||0);});
    html+=`<div class="group-subsection"><div class="group-subsection-label">Actions</div>`;
    sorted.forEach(n=>{html+=renderCard(n);});
    html+=`</div>`;
  }
  // Ideas & materials
  if(ideas.length){
    html+=`<div class="group-subsection"><div class="group-subsection-label">Ideas & Materials</div>`;
    ideas.forEach(n=>{html+=renderCard(n);});
    html+=`</div>`;
  }
  // References
  if(refs.length){
    html+=`<div class="group-subsection"><div class="group-subsection-label">References</div>`;
    refs.forEach(n=>{html+=renderCard(n);});
    html+=`</div>`;
  }
  // Other (images, anchors, etc.)
  if(other.length){
    other.forEach(n=>{html+=renderCard(n);});
  }

  html+=`</div>`;
  return html;
}

function renderPage(){
  const content=document.getElementById('content');
  let html='';

  // Summary
  html+='<div id="doc-summary"></div>';

  if(!nodes.length){
    html+='<div class="empty">No nodes on the canvas yet. Open the canvas to start building.</div>';
    content.innerHTML=html;
    loadSummary();
    return;
  }

  // Build group map
  const groupMap={};
  const ungrouped=[];
  nodes.forEach(n=>{
    if(n.group_id){
      (groupMap[n.group_id]=groupMap[n.group_id]||[]).push(n);
    } else {
      ungrouped.push(n);
    }
  });

  // Render each group as a chapter
  html+='<h2>Canvas</h2>';
  groups.forEach(g=>{
    const gNodes=groupMap[g.id]||[];
    if(gNodes.length)html+=renderGroupSection(gNodes,g.label,g.id);
  });

  // Ungrouped nodes
  if(ungrouped.length){
    html+=renderGroupSection(ungrouped,'Ungrouped',null);
  }

  // Cross-group connections (links between nodes in different groups)
  const crossLinks=links.filter(l=>{
    const src=nodeById(l.source),tgt=nodeById(l.target);
    if(!src||!tgt)return false;
    return src.group_id!==tgt.group_id&&(l.link_type&&l.link_type!=='related');
  });
  if(crossLinks.length){
    html+='<h2>Cross-Group Connections</h2>';
    html+='<div style="font-size:11px;color:var(--tx2);">';
    crossLinks.forEach(l=>{
      const src=nodeById(l.source),tgt=nodeById(l.target);
      if(!src||!tgt)return;
      const srcG=groups.find(g=>g.id===src.group_id);
      const tgtG=groups.find(g=>g.id===tgt.group_id);
      const lt=l.link_type||'related';
      html+=`<div style="padding:4px 0;border-bottom:1px solid var(--border);">`;
      html+=`<a class="see-on-canvas" href="canvas.html#highlight=${encodeURIComponent(src.id)}" style="color:var(--tx);font-weight:600;">${esc(src.label)}</a>`;
      html+=` <span style="color:var(--tx3);">${esc(lt)}</span> `;
      html+=`<a class="see-on-canvas" href="canvas.html#highlight=${encodeURIComponent(tgt.id)}" style="color:var(--tx);font-weight:600;">${esc(tgt.label)}</a>`;
      html+=`<span style="color:var(--tx3);font-size:9px;margin-left:8px;">${srcG?esc(srcG.label):'ungrouped'} → ${tgtG?esc(tgtG.label):'ungrouped'}</span>`;
      html+=`</div>`;
    });
    html+='</div>';
  }

  // Activity Feed
  if(activity.length){
    html+='<h2>Recent Activity</h2>';
    activity.forEach(a=>{
      const time=new Date(a.created_at).toLocaleString();
      html+=`<div class="activity-item"><span class="time">${time}</span>`;
      if(a.author)html+=`<span class="author">${esc(a.author)}</span> `;
      html+=`${esc(a.action)}`;
      if(a.detail)html+=` — ${esc(a.detail)}`;
      if(a.image_data)html+=`<br><img class="snapshot-thumb" src="${a.image_data}" onclick="openSnapshot(this.src)" alt="Canvas snapshot">`;
      html+='</div>';
    });
  }

  content.innerHTML=html;
  loadSummary();
}

async function loadSummary(){
  const el=document.getElementById('doc-summary');
  if(!el)return;
  try{
    const{data}=await sb.from('canvas_config').select('value,updated_at').eq('key','summary').single();
    if(data&&data.value){
      el.innerHTML=`<div class="summary-text">${renderSummaryMarkdown(data.value)}</div><div style="font-size:9px;color:var(--tx3);margin-top:8px;">Summary updated ${new Date(data.updated_at).toLocaleString()}</div>`;
    } else {
      el.innerHTML='<div class="empty">No summary yet. Click "Summary" in the canvas Claude panel to generate one.</div>';
    }
  }catch(_){el.innerHTML='';}
}

async function loadAllData(){
  const[nRes,gRes,lRes,aRes]=await Promise.all([
    sb.from('canvas_nodes').select('*'),
    sb.from('canvas_groups').select('*'),
    sb.from('canvas_links').select('*'),
    sb.from('activity_log').select('*').order('created_at',{ascending:false}).limit(20),
  ]);
  nodes=nRes.data||[];groups=gRes.data||[];links=lRes.data||[];activity=aRes.data||[];
}

function subscribeRealtime(){
  sb.channel('doc-rt-sound')
    .on('postgres_changes',{event:'*',schema:'public',table:'canvas_nodes'},()=>{loadAllData().then(renderPage);})
    .on('postgres_changes',{event:'*',schema:'public',table:'canvas_groups'},()=>{loadAllData().then(renderPage);})
    .on('postgres_changes',{event:'*',schema:'public',table:'canvas_links'},()=>{loadAllData().then(renderPage);})
    .on('postgres_changes',{event:'*',schema:'public',table:'canvas_config'},()=>{loadSummary();})
    .on('postgres_changes',{event:'*',schema:'public',table:'activity_log'},()=>{loadAllData().then(renderPage);})
    .subscribe();
}

(async function init(){
  await loadAllData();
  renderPage();
  subscribeRealtime();
})();
</script>
</body>
</html>
