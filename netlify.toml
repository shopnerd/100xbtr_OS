[functions]
  directory = "netlify/functions"
  external_node_modules = ["@anthropic-ai/sdk"]

[functions."claude"]
  timeout = 60

[[headers]]
  for = "/canvas.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
